# ==================== 基础驱动配置 ====================
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_EXT_POWER=y

# ==================== PMW3610 基本配置 ====================
CONFIG_PMW3610=y

# 鼠标移动 DPI：从 1600 提高到 3200，等于鼠标速度增加一倍
CONFIG_PMW3610_CPI=3200
CONFIG_PMW3610_CPI_DIVIDOR=4

CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_INVERT_X=y

# ==================== PMW3610 功能配置 ====================
# SnapT / 瞄准模式保持不变
CONFIG_PMW3610_SNIPE_CPI=200
CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=1

# DrgT / 滚动模式降低 60% 灵敏度：
# 原来 70，现在改成 175，相当于滚动速度变成原来的 40%
CONFIG_PMW3610_SCROLL_TICK=175

CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_SMART_ALGORITHM=y

# ==================== PMW3610 功耗配置 ====================
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=100
CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=200
CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=300
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=500
CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=3000
CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=30000
