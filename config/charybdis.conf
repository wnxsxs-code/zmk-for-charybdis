# ==================== ZMK Studio ====================
CONFIG_ZMK_STUDIO_LOCKING=n

# ==================== Mouse / Trackball ====================
CONFIG_ZMK_MOUSE=y

# 鼠标移动速度：比上一版再快一倍
# 如果你上一版是 3200 / 4，这里改成 3200 / 2
CONFIG_PMW3610_CPI=3200
CONFIG_PMW3610_CPI_DIVIDOR=2

# 保留原来可编译的轨迹球方向配置
CONFIG_PMW3610_SMART_ALGORITHM=y
CONFIG_PMW3610_ORIENTATION_90=y
CONFIG_PMW3610_INVERT_X=y

# 自动鼠标层超时，保守值
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=400
